    <div id="alarm" data-tab="view">
        <!-- tabs: view, edit-->
        <div id="alarm-view">
            <template>
                <div class="single-alarm">
                    <div class="alarm-scheduled-time">
                        <div class="entry-time">
                            10:00 AM
                        </div>
                        <div class="entry-rem-time">
                            Alarm in 7 days
                        </div>
                    </div>
                    <label class="alarm-switch">
                        <input type="checkbox" checked>
                        <span class="slider round"></span>
                    </label>
                    <input type="button" class="delete-alarm" value="&times;">
                </div>
            </template>
        </div>
        <div id="alarm-edit">
            <div id="alarm-time">
                <input id='alarm-hour' type="number" value="00" min="0" max="23">
                <input id='alarm-minute' type="number" value="00" min="0" max="60">
            </div>

            <div id="alarm-options" data-repeat='once'>
                <div id="alarm-repeat">
                    <label><input type="radio" id='alarm-once' name="alarm-repeat" value="once" checked>Once</label><br>
                    <label><input type="radio" id='alarm-daily' name="alarm-repeat" value="daily">Daily</label><br>
                    <label><input type="radio" id="alarm-custom" name="alarm-repeat" value="custom">Custom</label>
                </div>

                <div id="alarm-days">
                    <label><input type="checkbox" name="alarm-days" value="0">Sun</label><br>
                    <label><input type="checkbox" name="alarm-days" value="1">Mon</label><br>
                    <label><input type="checkbox" name="alarm-days" value="2">Tue</label><br>
                    <label><input type="checkbox" name="alarm-days" value="3">Wed</label><br>
                    <label><input type="checkbox" name="alarm-days" value="4">Thu</label><br>
                    <label><input type="checkbox" name="alarm-days" value="5">Fri</label><br>
                    <label><input type="checkbox" name="alarm-days" value="6">Sat</label><br>
                </div>

                <input id='alarm-label' type='text' placeholder="Alarm Label">
            </div>

            <div class="btn">
                <input type="button" value="cancel">
                <input type="button" value="save">
            </div>

        </div>
    </div>
